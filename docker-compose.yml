version: '3.8'

services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flowtask-php
    container_name: flowtask-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - flowtask-network

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: flowtask-nginx
    restart: unless-stopped
    tty: true
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - flowtask-network

  # MySQL Service
  mysql:
    image: mysql:8.0
    container_name: flowtask-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: flowtask
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: flowtask_user
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - flowtask-network

  # phpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flowtask-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
      PMA_PORT: 3306
    ports:
      - "8081:80"
    networks:
      - flowtask-network

# Docker Networks
networks:
  flowtask-network:
    driver: bridge

# Volumes
volumes:
  mysql_data:
    driver: local
